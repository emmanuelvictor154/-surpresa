<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um plano para nós...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffdde1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        /* Estilo da Roleta */
        .roleta-box {
            background: #fff;
            border: 3px dashed #ff4d6d;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            margin: 25px 0;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .sorteado {
            color: #ff4d6d;
            transform: scale(1.1);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-principal {
            background-color: #d63384;
            color: white;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.3);
        }

        .btn-principal:hover {
            transform: scale(1.05);
        }

        #btn-sim {
            background-color: #28a745;
            color: white;
        }

        #btn-sim:hover {
            transform: scale(1.1);
        }

        #btn-nao {
            background-color: #dc3545;
            color: white;
            position: absolute;
        }

        .escondido {
            display: none !important;
        }

        .sucesso h2 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .sucesso p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .coracao {
            position: absolute;
            color: #ff4d6d;
            font-size: 24px;
            animation: subir 3s linear infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes subir {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Tela do Jogo -->
        <div id="tela-jogo">
            <h1>Vamos decidir nosso fim de semana? 🎲</h1>
            
            <div class="roleta-box" id="roleta">
                ❓ Clique no botão para sortear
            </div>

            <!-- Botão Inicial para Girar -->
            <button class="btn-principal" id="btn-girar" onclick="girarRoleta()">Descobrir nosso destino ✨</button>

            <!-- Botões de Decisão (Iniciam escondidos) -->
            <div class="buttons escondido" id="bloco-decisao">
                <button id="btn-sim" onclick="aceitou()">Fechado! 🤝</button>
                <button id="btn-nao" onmouseover="fuga()" onclick="fuga()">Não gostei</button>
            </div>
        </div>

        <!-- Tela de Sucesso -->
        <div id="tela-sucesso" class="escondido sucesso">
            <h2>Ebaaa! Plano perfeito! ❤️</h2>
            <p id="mensagem-final"></p>
        </div>
    </div>

    <script>
        // Lista com as 6 opções românticas e divertidas
        const opcoes = [
            "🍕 Rodízio de Pizza + Conversar fiado",
            "🍦 Cinema + Sorvete no final da tarde",
            "🍔 Hambúrguer artesanal (por minha conta!)",
            "🍿 Maratona de filmes + Pipoca embaixo das cobertas",
            "🌅 Ver o pôr do sol + Comer um açaí gelado",
            "☕ Ir naquele café fofo que você sempre quis ir"
        ];

        const roleta = document.getElementById('roleta');
        const btnGirar = document.getElementById('btn-girar');
        const blocoDecisao = document.getElementById('bloco-decisao');
        const btnNao = document.getElementById('btn-nao');
        const telaJogo = document.getElementById('tela-jogo');
        const telaSucesso = document.getElementById('tela-sucesso');
        const mensagemFinal = document.getElementById('mensagem-final');

        let opcaoSelecionada = "";

        function girarRoleta() {
            btnGirar.disabled = true;
            let voltas = 0;
            
            // Efeito visual de rotação rápida
            const intervalo = setInterval(() => {
                const indiceAleatorio = Math.floor(Math.random() * opcoes.length);
                roleta.innerText = opcoes[indiceAleatorio];
                voltas++;

                // Para a roleta após rodar o suficiente
                if (voltas > 15) {
                    clearInterval(intervalo);
                    
                    // Define o resultado final real
                    const indiceFinal = Math.floor(Math.random() * opcoes.length);
                    opcaoSelecionada = opcoes[indiceFinal];
                    
                    roleta.innerText = opcaoSelecionada;
                    roleta.classList.add('sorteado');
                    
                    // Esconde o botão de girar e mostra o Sim/Não
                    btnGirar.classList.add('escondido');
                    blocoDecisao.classList.remove('escondido');
                }
            }, 100);
        }

        function fuga() {
            const larguraJanela = window.innerWidth - 120;
            const alturaJanela = window.innerHeight - 60;

            const novoX = Math.random() * larguraJanela;
            const novoY = Math.random() * alturaJanela;

            btnNao.style.position = 'fixed';
            btnNao.style.left = novoX + 'px';
            btnNao.style.top = novoY + 'px';
        }

        function aceitou() {
            telaJogo.classList.add('escondido');
            telaSucesso.classList.remove('escondido');
            
            // Personaliza a mensagem final com o que foi sorteado
            mensagemFinal.innerHTML = `Você acabou de fazer o meu dia muito mais feliz!<br><br>O combinado está de pé: <strong>${opcaoSelecionada}</strong>. Já vou deixar tudo organizado! 🥰`;
            
            setInterval(criarCoracao, 150);
        }

        function criarCoracao() {
            const coracao = document.createElement('div');
            coracao.classList.add('coracao');
            coracao.innerHTML = '❤️';
            coracao.style.left = Math.random() * 100 + 'vw';
            coracao.style.fontSize = Math.random() * 20 + 15 + 'px';
            coracao.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(coracao);

            setTimeout(() => { coracao.remove(); }, 4000);
        }
    </script>
</body>
</html>
